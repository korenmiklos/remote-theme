<footer class="mx-auto max-w-7xl px-6 lg:px-8" aria-labelledby="footer-heading">
  <h2 id="footer-heading" class="sr-only">Footer</h2>
  <div class="flex flex-col lg:flex-row items-center lg:justify-between">
    <div class="pt-11 pb-12">
      <a href="{{ "/" | relative_url }}">
        <img class="h-24 w-auto" src="{{ site.data.config[site.website].logo | absolute_url }}" loading="lazy" height="96" alt="{{ site.title }}">
      </a>
    </div>
    <div class="flex space-x-6 border-t lg:border-0 border-gray-3 w-full lg:w-auto justify-center items-center pt-8">
      {% include social-networks.html %}
      <a href="{{ '/llms.txt' | relative_url }}" class="group flex items-center gap-1 text-gray-2 hover:text-red transition-colors" title="LLM-readable version available">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 3v4a1 1 0 0 0 1 1h4"/>
          <path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/>
          <path d="M9 17v-6"/>
          <path d="M12 17v-6"/>
          <path d="M15 17v-6"/>
        </svg>
      </a>
    </div>
    </div>
  </div>
  <div class="lg:border-t border-gray-3 text-center pt-9 pb-10">
    <p class="font-light text-sm text-gray-2">{{ site.data.config[site.website].copyright }}</p>
  </div>
</footer>
