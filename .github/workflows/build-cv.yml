name: Build CV PDF

on:
  push:
    branches: [main, master]
    paths:
      - 'cv.md'
      - '_publications/**'
      - '_data/**'
      - 'src/**'
      - '.github/workflows/build-cv.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'cv.md'
      - '_publications/**'
      - '_data/**'
      - 'src/**'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:           # Manual trigger
  release:
    types: [created]           # On release creation

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout repository
      - name: Checkout
        uses: actions/checkout@v4
      
      # Step 2: Setup Python for data processing
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          pip install pyyaml
      
      # Step 4: Generate JSON data from cv.md and _publications
      - name: Generate CV data
        run: |
          python src/generate_cv_data.py
      
      # Step 5: Setup Typst
      - name: Setup Typst
        uses: typst-community/setup-typst@v3
        with:
          version: '0.11.0'
      
      # Step 6: Install fonts (if any custom fonts in assets)
      - name: Install custom fonts
        run: |
          mkdir -p ~/.local/share/fonts
          if [ -d "assets/fonts" ]; then
            cp assets/fonts/* ~/.local/share/fonts/ 2>/dev/null || true
            fc-cache -f -v
          fi
      
      # Step 7: Build PDF with Typst
      - name: Build CV PDF
        run: |
          mkdir -p output
          cd src
          typst compile cv_template.typ ../output/Miklos_Koren_CV.pdf
          cd ..
      
      # Step 8: Upload artifact for PR/preview
      - name: Upload artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: cv-preview
          path: output/Miklos_Koren_CV.pdf
          retention-days: 7
      
      # Step 9: Upload to release (on release creation)
      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: output/Miklos_Koren_CV.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # Step 10: Commit PDF to repository (optional - on push to main)
      - name: Commit PDF to repository
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/Miklos_Koren_CV.pdf
          git diff --staged --quiet || (git commit -m "Update CV PDF [skip ci]" && git push)

  # Optional: Build on tag push (alternative release strategy)
  release-on-tag:
    if: startsWith(github.ref, 'refs/tags/cv-')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cv-preview
          path: output
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: output/Miklos_Koren_CV.pdf
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
